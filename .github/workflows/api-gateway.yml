name: API Gateway CI-CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - api-gateway/**
      - .github/workflows/api-gateway.yml
  pull_request:
    branches:
      - main
      - develop
    paths:
      - api-gateway/**
      - .github/workflows/api-gateway.yml

jobs:
  ci:
    name: API Gateway Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api-gateway image
        run: docker build -t api-gateway:ci ./api-gateway

  cd:
    name: Publish API Gateway image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-api-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-api-gateway:${{ github.sha }}
